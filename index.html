<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business blog card</title>
    <!-- Importation de la favicon -->
    <link
      rel="shortcut icon"
      href="img/hero-image-business-card.png"
      type="image/x-icon"
    />
    <!-- Importation des styles -->
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Début de la section card -->
    <section class="card">
      <div class="card__header">
        <div class="card__header__hero">
          <img
            src="img/hero-image-business-card.png"
            alt="hero"
            class="hero__image"
          />
          <img
            src="img/white-overlay.svg"
            alt="overlay"
            class="overlay__image"
          />
        </div>
        <div class="card__header__text">
          <h2>Perfect solution for small business</h2>
          <p>
            Small businesses need to generate leads to grow. You can use tools
            like Ringy.
          </p>
        </div>
      </div>

      <div class="card__footer">
        <div class="card__footer__image">
          <img src="img/avatar-image-business-card.png" alt="avatar" />
        </div>
        <div class="card__footer__user__informations">
          <h3>Amy Burgess</h3>
          <p>Customer Manger, Solution Oy</p>
        </div>
      </div>
    </section>
    <!-- Fin de la section card -->
  </body>
</html>
